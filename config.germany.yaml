run:
  user_agent: "Mozilla/5.0 (compatible; JobScraperBot/2.0; +contact@example.com)"
  delay_seconds: 0.4
  max_pages: 2000
  max_depth: 3
  obey_robots: false
  use_playwright: false
  allow_domains: []
  confirm_permission: true

keywords:
  include:
    - software
    - engineer
    - developer
    - backend
    - frontend
    - fullstack
    - full-stack
    - full stack
    - data
    - "machine learning"
    - ml
    - ai
    - "artificial intelligence"
    - llm
    - nlp
    - "computer vision"
    - mlops
    - devops
    - sre
    - platform
    - cloud
    - kubernetes
    - python
    - typescript
    - golang
    - rust
    - java
    - scala
    - kotlin
    - android
    - ios
    - mobile
    - security
    - infosec
    - "data engineer"
    - "data scientist"
    - "data analyst"
    - "analytics engineer"
    - "research engineer"
    - "applied scientist"
    - genai
    - "generative ai"
    - "tech lead"
    - "staff engineer"
    - "principal engineer"
    - architect
    - cto
    - "qa engineer"
    - sdet
    - embedded
    - firmware
    - "hardware engineer"
    - robotics
    - quant
    - softwareentwickler
    - entwickler
    - softwareingenieur
  exclude:
    - intern
    - praktikum
    - werkstudent
    - "student "
  sectors: []

locations:
  include:
    - germany
    - deutschland
    - de
    - berlin
    - munich
    - münchen
    - muenchen
    - hamburg
    - frankfurt
    - cologne
    - köln
