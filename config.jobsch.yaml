run:
  user_agent: JobScraperBot/1.0 (+contact@example.com)
  delay_seconds: 0.05
  max_pages: 100
  obey_robots: false
  confirm_permission: true
  use_playwright: false
  deep_scrape: true
  deep_concurrency: 16
  deep_per_host_concurrency: 8
  deep_per_host_delay_seconds: 0.1
  deep_max_retries: 3
  cache_enabled: true
  rotate_user_agents: true
  proxies: []
  proxy_rotation: random
  proxy_max_failures: 1
  proxy_cooldown_seconds: 900
keywords:
  include: []
  exclude: []
  sectors: []
locations:
  include: []
  exclude: []
  allow_remote: true
targets:
- name: jobs.ch-smoketest
  url: https://www.jobs.ch/en/vacancies/?category=106&category=146&category=156&category=167&employment-type=1&employment-type=2&employment-type=4&employment-type=5&publication-date=30&term=
  adapter: jobs.ch
exports:
  csv:
    enabled: true
    path: output/jobsch_full.csv
